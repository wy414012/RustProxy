# RustProxy 客户端配置
# 客户端无需配置代理规则，所有规则由服务端 Web 面板管理
# 客户端每次启动自动从服务端拉取属于自己的代理规则

[client]
# 客户端唯一标识（服务端通过此 ID 关联代理规则）
id = "my-laptop"
# 服务端地址
server_addr = "127.0.0.1"
server_port = 7000
# 必须与服务端 token 一致（⚠️ 生产环境必须修改！）
token = "CHANGE_ME_TO_A_RANDOM_SECRET"
# 服务端 CA 证书路径
#   - 留空: 跳过证书验证，适用于 auto_cert 自签证书模式（仅开发/测试环境）
#   - 指定路径: 加载 CA 证书进行标准 TLS 验证（⚠️ 生产环境推荐）
# 使用方式: 将服务端 certs/server.crt 复制到客户端可访问的路径，例如:
#   ca_cert = "certs/ca.crt"
ca_cert = ""
