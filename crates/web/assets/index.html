<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RustProxy 管理面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#242838;--border:#2e3348;--primary:#6c5ce7;--primary-hover:#7c6ff7;--success:#00b894;--danger:#e74c3c;--danger-hover:#c0392b;--warn:#fdcb6e;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--primary);text-decoration:none}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px}
.login-card h1{text-align:center;margin-bottom:8px;font-size:22px}
.login-card p{text-align:center;color:var(--text2);margin-bottom:28px;font-size:14px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0}
.sidebar .logo{padding:0 20px 20px;font-size:18px;font-weight:700;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar .logo span{color:var(--primary)}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--text2);font-size:14px;transition:all .2s;border-left:3px solid transparent}
.sidebar nav a:hover{background:var(--surface2);color:var(--text)}
.sidebar nav a.active{color:var(--primary);background:var(--surface2);border-left-color:var(--primary)}
.main{flex:1;padding:28px 32px;overflow-y:auto}

/* Form */
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-group input,.form-group select{width:100%;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--primary)}
.form-group select option{background:var(--surface);color:var(--text)}

/* Button */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:var(--danger-hover)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-warn{background:var(--warn);color:#333}
.btn-warn:hover{opacity:.85}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-header h2{font-size:16px;font-weight:600}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-card .label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-card .value{font-size:28px;font-weight:700}
.stat-card .value.online{color:var(--success)}
.stat-card .value.offline{color:var(--text3)}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:11px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2)}
tr:hover td{background:var(--surface2)}
td.actions{white-space:nowrap}

/* Badge */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-online{background:rgba(0,184,148,.15);color:var(--success)}
.badge-offline{background:rgba(100,116,139,.15);color:var(--text3)}
.badge-tcp{background:rgba(108,92,231,.15);color:var(--primary)}
.badge-udp{background:rgba(253,203,110,.15);color:var(--warn)}
.badge-http{background:rgba(0,184,148,.15);color:var(--success)}
.badge-https{background:rgba(52,152,219,.15);color:#3498db}
.badge-starting{background:rgba(108,92,231,.15);color:var(--primary)}
.badge-running{background:rgba(0,184,148,.15);color:var(--success)}
.badge-stopping{background:rgba(253,203,110,.15);color:var(--warn)}
.badge-stopped{background:rgba(100,116,139,.15);color:var(--text3)}
.badge-error{background:rgba(231,76,60,.15);color:var(--danger)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:480px;max-width:90vw}
.modal h3{margin-bottom:20px;font-size:16px}
.modal .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:var(--radius);font-size:13px;z-index:200;animation:slideIn .3s ease;max-width:360px}
.toast-success{background:var(--success);color:#fff}
.toast-error{background:var(--danger);color:#fff}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Empty */
.empty{text-align:center;padding:40px;color:var(--text3)}
.empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.3}

/* Responsive */
@media(max-width:768px){.sidebar{display:none}.main{padding:16px}}
</style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage" class="login-wrap">
  <div class="login-card">
    <h1>RustProxy</h1>
    <p>内网穿透管理面板</p>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="loginUser" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="loginPass" placeholder="password" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="doLogin()">登 录</button>
    <p id="loginError" style="color:var(--danger);font-size:13px;margin-top:12px;text-align:center;display:none"></p>
  </div>
</div>

<!-- App -->
<div id="appPage" class="app" style="display:none">
  <aside class="sidebar">
    <div class="logo">Rust<span>Proxy</span></div>
    <nav>
      <a href="#" class="active" data-page="dashboard" onclick="navigate('dashboard',this)">仪表盘</a>
      <a href="#" data-page="proxies" onclick="navigate('proxies',this)">代理规则</a>
      <a href="#" data-page="clients" onclick="navigate('clients',this)">客户端</a>
      <a href="#" onclick="doLogout()" style="margin-top:40px;color:var(--danger)">退出登录</a>
    </nav>
  </aside>
  <div class="main">
    <!-- Dashboard -->
    <div id="page-dashboard">
      <h1 style="margin-bottom:24px">仪表盘</h1>
      <div class="stats" id="statsGrid"></div>
      <div class="card">
        <div class="card-header"><h2>最近代理</h2></div>
        <div class="table-wrap"><table id="dashProxyTable"></table></div>
      </div>
    </div>
    <!-- Proxies -->
    <div id="page-proxies" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
        <h1>代理规则</h1>
        <button class="btn btn-primary" onclick="showCreateModal()">+ 添加规则</button>
      </div>
      <div class="card">
        <div class="table-wrap"><table id="proxyTable"></table></div>
      </div>
    </div>
    <!-- Clients -->
    <div id="page-clients" style="display:none">
      <h1 style="margin-bottom:24px">客户端</h1>
      <div class="card">
        <div class="table-wrap"><table id="clientTable"></table></div>
      </div>
    </div>
  </div>
</div>

<!-- Create/Edit Proxy Modal -->
<div id="proxyModal" class="modal-overlay">
  <div class="modal">
    <h3 id="modalTitle">添加代理规则</h3>
    <div class="form-group"><label>规则名称</label><input id="proxyName" placeholder="my-proxy"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label>协议类型</label>
        <select id="proxyType" onchange="onProxyTypeChange()"><option value="tcp">TCP</option><option value="udp">UDP</option><option value="http">HTTP</option><option value="https">HTTPS</option></select>
      </div>
      <div class="form-group"><label>客户端 ID</label><input id="proxyClientId" placeholder="my-laptop"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group" id="serverPortGroup"><label>服务端监听端口</label><input id="proxyRemotePort" type="number" placeholder="6000"><div style="font-size:11px;color:var(--text3);margin-top:3px">外部用户访问的服务器端口</div></div>
      <div class="form-group" id="domainGroup" style="display:none"><label>自定义域名</label><input id="proxyDomains" placeholder="api.example.com, web.example.com"><div style="font-size:11px;color:var(--text3);margin-top:3px">基于域名路由，逗号分隔</div></div>
    </div>
    <div class="form-group"><label>映射客户端服务地址</label><input id="proxyLocalAddr" placeholder="8080 或 192.168.1.100:3306"><div style="font-size:11px;color:var(--text3);margin-top:3px">客户端本地服务地址，只填端口默认 127.0.0.1</div></div>
    <div class="form-group"><label>PROXY Protocol</label>
      <select id="proxyProtocol">
        <option value="">关闭（不注入）</option>
        <option value="v1">v1（文本格式，兼容性好）</option>
        <option value="v2">v2（二进制格式，效率高）</option>
      </select>
      <div style="font-size:11px;color:var(--text3);margin-top:3px">向本地服务注入 PROXY Protocol 头，让后端获取用户真实 IP</div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="hideProxyModal()">取消</button>
      <button class="btn btn-primary" id="modalSubmitBtn" onclick="submitProxy()">创建</button>
    </div>
  </div>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('rp_token') || '';
let ws = null;
let editingProxy = null; // null = 创建模式, string = 编辑模式（规则名）

// ---- API ----
async function api(method, path, body) {
  const h = {'Content-Type': 'application/json'};
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API + path, {method, headers: h, body: body ? JSON.stringify(body) : undefined});
  const d = await r.json();
  if (d.code !== 200) throw new Error(d.message);
  return d.data;
}

// ---- Auth ----
async function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  if (!u || !p) { errEl.textContent='请输入用户名和密码'; errEl.style.display='block'; return; }
  try {
    const d = await api('POST', '/auth/login', {username: u, password: p});
    token = d.token;
    localStorage.setItem('rp_token', token);
    enterApp();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}
function doLogout() {
  token = '';
  localStorage.removeItem('rp_token');
  if (ws) { ws.close(); ws = null; }
  document.getElementById('appPage').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}
async function enterApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appPage').style.display = 'flex';
  connectWS();
  await refreshAll();
}
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });

// ---- Navigation ----
function navigate(page, el) {
  document.querySelectorAll('.sidebar nav a').forEach(a=>a.classList.remove('active'));
  if (el) el.classList.add('active');
  document.querySelectorAll('.main > div[id^="page-"]').forEach(d=>d.style.display='none');
  document.getElementById('page-'+page).style.display = 'block';
  refreshAll();
}

// ---- Data ----
async function refreshAll() {
  try {
    const [status, proxies, clients] = await Promise.all([
      api('GET', '/status'),
      api('GET', '/proxies'),
      api('GET', '/clients')
    ]);
    renderStats(status, proxies, clients);
    renderProxies(proxies);
    renderClients(clients);
    renderDashProxies(proxies);
  } catch(e) {
    if (e.message.includes('401') || e.message.includes('Unauthorized')) doLogout();
  }
}

// ---- Stats ----
function renderStats(status, proxies, clients) {
  const online = clients.filter(c=>c.online).length;
  const totalBwIn = proxies.reduce((s,p)=>s+p.bandwidth_in, 0);
  const totalBwOut = proxies.reduce((s,p)=>s+p.bandwidth_out, 0);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="label">版本</div><div class="value" style="font-size:20px">v${status.version}</div></div>
    <div class="stat-card"><div class="label">在线客户端</div><div class="value online">${online}</div></div>
    <div class="stat-card"><div class="label">代理规则</div><div class="value">${status.total_proxies}</div></div>
    <div class="stat-card"><div class="label">服务器带宽</div><div class="value" style="font-size:18px;color:var(--primary)">↑${fmtBw(totalBwOut)} ↓${fmtBw(totalBwIn)}</div></div>
  `;
}

// ---- Proxies ----
const STATUS_LABEL = {starting:'启动中',running:'运行中',stopping:'停止中',stopped:'已停止',error:'错误'};
function statusLabel(s) { return STATUS_LABEL[s] || s; }

function renderProxies(proxies) {
  const t = document.getElementById('proxyTable');
  if (!proxies.length) { t.innerHTML='<thead></thead><tbody></tbody>'; return; }
  t.innerHTML = `<thead><tr><th>名称</th><th>类型</th><th>客户端</th><th>服务端口</th><th>客户端地址</th><th>域名</th><th>PROXY</th><th>状态</th><th>连接</th><th>带宽</th><th>操作</th></tr></thead>
  <tbody>${proxies.map(p=>{
    const isStream = (p.proxy_type==='tcp'||p.proxy_type==='udp');
    const clientAddr = (p.local_ip&&p.local_ip!=='127.0.0.1') ? p.local_ip+':'+p.local_port : '127.0.0.1:'+p.local_port;
    const ppLabel = p.proxy_protocol ? 'v'+p.proxy_protocol.replace('v','') : '-';
    const busy = (p.status==='starting'||p.status==='stopping');
    return `<tr>
    <td style="color:var(--text)">${esc(p.name)}</td>
    <td><span class="badge badge-${p.proxy_type}">${p.proxy_type.toUpperCase()}</span></td>
    <td>${esc(p.client_id)}</td>
    <td>${isStream?(p.remote_port||'-'):'共享'}</td>
    <td>${esc(clientAddr)}</td>
    <td>${p.custom_domains.length?p.custom_domains.map(esc).join(', '):'-'}</td>
    <td>${ppLabel}</td>
    <td><span class="badge badge-${p.status}">${statusLabel(p.status)}</span></td>
    <td>${p.connections}</td>
    <td style="font-size:12px">↑${fmtBw(p.bandwidth_out)} ↓${fmtBw(p.bandwidth_in)}</td>
    <td class="actions">
      <button class="btn btn-warn btn-sm" onclick="editProxy('${esc(p.name)}')" ${busy?'disabled style="opacity:.4;pointer-events:none"':''}>编辑</button>
      <button class="btn btn-danger btn-sm" onclick="deleteProxy('${esc(p.name)}')" ${busy?'disabled style="opacity:.4;pointer-events:none"':''}>删除</button>
    </td>
  </tr>`}).join('')}</tbody>`;
}

function renderDashProxies(proxies) {
  const t = document.getElementById('dashProxyTable');
  const top = proxies.slice(0, 5);
  if (!top.length) { t.innerHTML='<thead></thead><tbody></tbody>'; return; }
  t.innerHTML = `<thead><tr><th>名称</th><th>类型</th><th>映射</th><th>状态</th><th>连接</th><th>带宽</th></tr></thead>
  <tbody>${top.map(p=>{
    const isStream = (p.proxy_type==='tcp'||p.proxy_type==='udp');
    const mapping = isStream ? ':'+p.remote_port+' → '+p.local_ip+':'+p.local_port : p.custom_domains.map(esc).join(', ');
    return `<tr>
    <td style="color:var(--text)">${esc(p.name)}</td>
    <td><span class="badge badge-${p.proxy_type}">${p.proxy_type.toUpperCase()}</span></td>
    <td style="font-size:12px">${mapping}</td>
    <td><span class="badge badge-${p.status}">${statusLabel(p.status)}</span></td>
    <td>${p.connections}</td>
    <td style="font-size:12px">↑${fmtBw(p.bandwidth_out)} ↓${fmtBw(p.bandwidth_in)}</td>
  </tr>`}).join('')}</tbody>`;
}

// ---- Modal ----
function showCreateModal() {
  editingProxy = null;
  document.getElementById('modalTitle').textContent = '添加代理规则';
  document.getElementById('modalSubmitBtn').textContent = '创建';
  document.getElementById('proxyName').value = '';
  document.getElementById('proxyName').disabled = false;
  document.getElementById('proxyType').value = 'tcp';
  document.getElementById('proxyClientId').value = '';
  document.getElementById('proxyRemotePort').value = '';
  document.getElementById('proxyLocalAddr').value = '';
  document.getElementById('proxyDomains').value = '';
  document.getElementById('proxyProtocol').value = '';
  onProxyTypeChange();
  document.getElementById('proxyModal').classList.add('show');
  document.getElementById('proxyName').focus();
}

async function editProxy(name) {
  try {
    const p = await api('GET', '/proxies/' + encodeURIComponent(name));
    editingProxy = name;
    document.getElementById('modalTitle').textContent = '编辑代理规则';
    document.getElementById('modalSubmitBtn').textContent = '保存';
    document.getElementById('proxyName').value = p.name;
    document.getElementById('proxyName').disabled = true;
    document.getElementById('proxyType').value = p.proxy_type;
    document.getElementById('proxyClientId').value = p.client_id;
    document.getElementById('proxyRemotePort').value = p.remote_port || '';
    // 组装客户端地址
    const addr = p.local_ip + ':' + p.local_port;
    document.getElementById('proxyLocalAddr').value = addr;
    document.getElementById('proxyDomains').value = p.custom_domains.join(', ');
    document.getElementById('proxyProtocol').value = p.proxy_protocol || '';
    onProxyTypeChange();
    document.getElementById('proxyModal').classList.add('show');
  } catch(e) { toast(e.message, 'error'); }
}

function hideProxyModal() {
  document.getElementById('proxyModal').classList.remove('show');
  document.getElementById('proxyName').disabled = false;
}

// 根据协议类型切换表单字段显示
function onProxyTypeChange() {
  const type = document.getElementById('proxyType').value;
  const isStream = (type === 'tcp' || type === 'udp');
  document.getElementById('serverPortGroup').style.display = isStream ? '' : 'none';
  document.getElementById('domainGroup').style.display = isStream ? 'none' : '';
}

async function submitProxy() {
  const name = document.getElementById('proxyName').value.trim();
  const type = document.getElementById('proxyType').value;
  const clientId = document.getElementById('proxyClientId').value.trim();
  const remotePort = parseInt(document.getElementById('proxyRemotePort').value) || 0;
  const localAddr = document.getElementById('proxyLocalAddr').value.trim();
  const domains = document.getElementById('proxyDomains').value.trim().split(',').map(s=>s.trim()).filter(Boolean);
  const proxyProtocol = document.getElementById('proxyProtocol').value;

  // 解析客户端服务地址
  let localIp = '127.0.0.1';
  let localPort = 0;
  if (localAddr.includes(':')) {
    // 支持 IPv6 和 IPv4
    if (localAddr.startsWith('[')) {
      // [::1]:port
      const closeBracket = localAddr.indexOf(']');
      if (closeBracket >= 0) {
        localIp = localAddr.substring(1, closeBracket);
        const portStr = localAddr.substring(closeBracket + 1).replace(':', '');
        localPort = parseInt(portStr) || 0;
      }
    } else {
      const lastColon = localAddr.lastIndexOf(':');
      localIp = localAddr.substring(0, lastColon) || '127.0.0.1';
      localPort = parseInt(localAddr.substring(lastColon + 1)) || 0;
    }
  } else {
    // 只填了端口，IP 默认 127.0.0.1
    localPort = parseInt(localAddr) || 0;
  }

  if (!name || !clientId || !localPort) { toast('请填写必填项（名称、客户端ID、端口）','error'); return; }
  if ((type === 'tcp' || type === 'udp') && !remotePort) { toast('TCP/UDP 类型必须填写服务端监听端口','error'); return; }
  if ((type === 'http' || type === 'https') && !domains.length) { toast('HTTP/HTTPS 类型必须填写自定义域名','error'); return; }

  try {
    if (editingProxy) {
      // 更新模式：仅发送有变化的字段，HTTP/HTTPS 不发送 remote_port
      const body = { type, client_id: clientId, local_ip: localIp, local_port: localPort, custom_domains: domains, proxy_protocol: proxyProtocol };
      if (type === 'tcp' || type === 'udp') {
        body.remote_port = remotePort;
      }
      await api('PUT', '/proxies/' + encodeURIComponent(editingProxy), body);
      toast('规则更新成功','success');
    } else {
      // 创建模式
      await api('POST', '/proxies', {name, type, client_id: clientId, local_ip: localIp, local_port: localPort, remote_port: remotePort, custom_domains: domains, proxy_protocol: proxyProtocol});
      toast('规则创建成功','success');
    }
    hideProxyModal();
    await refreshAll();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteProxy(name) {
  if (!confirm('确认删除规则 "'+name+'" ？')) return;
  try {
    await api('DELETE', '/proxies/'+encodeURIComponent(name));
    toast('已删除','success');
    await refreshAll();
  } catch(e) { toast(e.message, 'error'); }
}

// ---- Clients ----
function renderClients(clients) {
  const t = document.getElementById('clientTable');
  if (!clients.length) { t.innerHTML='<thead></thead><tbody></tbody>'; return; }
  t.innerHTML = `<thead><tr><th>客户端 ID</th><th>状态</th></tr></thead>
  <tbody>${clients.map(c=>`<tr>
    <td style="color:var(--text)">${esc(c.id)}</td>
    <td><span class="badge ${c.online?'badge-online':'badge-offline'}">${c.online?'在线':'离线'}</span></td>
  </tr>`).join('')}</tbody>`;
}

// ---- WebSocket ----
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/api/ws?token=' + encodeURIComponent(token));
  ws.onmessage = e => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'status') refreshAll();
    } catch(_){}
  };
  ws.onclose = () => { setTimeout(connectWS, 5000); };
  ws.onerror = () => { ws.close(); };
}

// ---- Utils ----
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtBw(bps) { if (bps < 1024) return bps.toFixed(0)+'B/s'; if (bps < 1048576) return (bps/1024).toFixed(1)+'KB/s'; return (bps/1048576).toFixed(1)+'MB/s'; }
function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

// ---- Init ----
if (token) { enterApp(); }
</script>
