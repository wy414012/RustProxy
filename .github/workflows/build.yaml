name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # Lint & Test (对应 .cnb.yml push 中的 check/test/fmt/clippy)
  # ──────────────────────────────────────────────
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check
        run: cargo check --all

      - name: Test
        run: cargo test --all

      - name: Fmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all --

  # ──────────────────────────────────────────────
  # Build (对应 .cnb.yml push 中的 build，多架构交叉编译)
  # ──────────────────────────────────────────────
  build:
    name: Build - ${{ matrix.job.name }}
    needs: lint-test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        job:
          - { name: "amd64", target: "x86_64-unknown-linux-musl" }
          - { name: "arm64v8", target: "aarch64-unknown-linux-musl" }
          - { name: "armv7", target: "armv7-unknown-linux-musleabihf" }
          - { name: "i386", target: "i686-unknown-linux-musl" }
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Install cross
        run: cargo install cross --locked

      - name: Build
        run: cross build --release --all-features --target=${{ matrix.job.target }}

      - name: Exec chmod
        run: chmod -v a+x target/${{ matrix.job.target }}/release/rustproxy-server target/${{ matrix.job.target }}/release/rustproxy-client || true

      - name: Publish Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.job.name }}
          path: |
            target/${{ matrix.job.target }}/release/rustproxy-server
            target/${{ matrix.job.target }}/release/rustproxy-client
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Package & Release (对应 .cnb.yml tag_push)
  # 仅在推送 tag 或发布 release 时触发
  # ──────────────────────────────────────────────
  package:
    name: Package - ${{ matrix.job.name }}
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: lint-test
    strategy:
      fail-fast: false
      matrix:
        job:
          - { name: "x86_64", target: "x86_64-unknown-linux-musl", suffix: "x86_64-musl" }
          - { name: "aarch64", target: "aarch64-unknown-linux-musl", suffix: "aarch64-musl" }
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Install cross
        run: cargo install cross --locked

      - name: Build
        run: cross build --release --all-features --target=${{ matrix.job.target }}

      - name: Package server
        run: |
          mkdir -p dist/server
          cp target/${{ matrix.job.target }}/release/rustproxy-server dist/server/
          cp configs/server.toml dist/server/
          cp deploy/rustproxy-server.service dist/server/
          cp deploy/README.md dist/server/
          cd dist/server && tar czf ../rustproxy-server-${{ matrix.job.suffix }}.tar.gz rustproxy-server server.toml rustproxy-server.service README.md

      - name: Package client
        run: |
          mkdir -p dist/client
          cp target/${{ matrix.job.target }}/release/rustproxy-client dist/client/
          cp configs/client.toml dist/client/
          cp deploy/rustproxy-client.service dist/client/
          cp deploy/README.md dist/client/
          cd dist/client && tar czf ../rustproxy-client-${{ matrix.job.suffix }}.tar.gz rustproxy-client client.toml rustproxy-client.service README.md

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustproxy-server-${{ matrix.job.suffix }}
          path: dist/rustproxy-server-${{ matrix.job.suffix }}.tar.gz

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustproxy-client-${{ matrix.job.suffix }}
          path: dist/rustproxy-client-${{ matrix.job.suffix }}.tar.gz

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: package
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag 到当前 tag 的提交日志
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "# ${TAG_NAME}" > CHANGELOG.txt
          echo "" >> CHANGELOG.txt
          echo "$LOG" >> CHANGELOG.txt
          cat CHANGELOG.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.txt
          files: |
            dist/*.tar.gz
